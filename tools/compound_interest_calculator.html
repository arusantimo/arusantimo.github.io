<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복리 투자 수익 계산 - Arusantimo Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f28;
            --bg-tertiary: #232a38;
            --border-color: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --accent-primary: #00d9ff;
            --accent-secondary: #7c3aed;
            --accent-success: #10b981;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 16px;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0, 217, 255, 0.1);
        }
        
        .card h2 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 217, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }
        
        .input-wrapper .unit {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 40px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }
        
        .stat-box {
            background: rgba(0, 217, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 22px;
            color: var(--accent-primary);
            font-weight: 700;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        
        .stat-box.highlight {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }
        
        .stat-box.highlight .stat-value {
            color: #ff6b6b;
        }
        
        .stat-box.positive {
            border-left-color: var(--accent-success);
            background: rgba(16, 185, 129, 0.05);
        }
        
        .stat-box.positive .stat-value {
            color: var(--accent-success);
        }
        
        .table-card {
            grid-column: 1 / -1;
        }
        
        .tab-container {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .tabs {
            display: flex;
            gap: 0;
            overflow-x: auto;
        }
        
        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .tab:hover {
            color: var(--accent-primary);
        }
        
        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-top: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        table thead {
            background: rgba(0, 217, 255, 0.05);
            border-bottom: 1px solid var(--border-color);
        }
        
        table th {
            padding: 12px;
            text-align: right;
            font-weight: 700;
            color: var(--text-primary);
            border-right: 1px solid var(--border-color);
        }
        
        table th:first-child {
            text-align: left;
            border-right: 1px solid var(--border-color);
        }
        
        table th:last-child {
            border-right: none;
        }
        
        table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
        }
        
        table td:first-child {
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-right: 1px solid var(--border-color);
        }
        
        table td:last-child {
            border-right: none;
        }
        
        table tbody tr:hover {
            background: rgba(0, 217, 255, 0.05);
        }
        
        .number {
            font-family: 'Monaco', 'Courier New', monospace;
            font-weight: 600;
        }
        
        .highlight-row {
            background: rgba(16, 185, 129, 0.08);
            font-weight: 600;
        }
        
        .info-banner {
            background: rgba(0, 217, 255, 0.08);
            border-left: 3px solid var(--accent-primary);
            padding: 16px;
            border-radius: 8px;
            margin-top: 24px;
            font-size: 12px;
            color: var(--accent-primary);
            line-height: 1.6;
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 24px;
            }
            
            table {
                font-size: 12px;
            }
            
            table th,
            table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 복리 투자 수익 계산</h1>
        <p>월별 누적 자산 및 필요 수익금 추적</p>
    </header>
    
    <div class="container">
        <div class="dashboard">
            <!-- 입력 설정 카드 -->
            <div class="card">
                <h2>투자 설정</h2>
                
                <div class="input-group">
                    <label>초기 원금</label>
                    <div class="input-wrapper">
                        <input type="number" id="principal" value="500000000" min="0">
                        <span class="unit">원</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>월 재투자 금액</label>
                    <div class="input-wrapper">
                        <input type="number" id="monthlyInvestment" value="5000000" min="0">
                        <span class="unit">원</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>목표 월 수익률</label>
                    <div class="input-wrapper">
                        <input type="number" id="monthlyRate" value="1" min="0" step="0.1">
                        <span class="unit">%</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>시작 날짜</label>
                    <div class="input-wrapper">
                        <input type="date" id="startDate" value="2026-01-01">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>종료 날짜</label>
                    <div class="input-wrapper">
                        <input type="date" id="endDate" value="2028-01-01">
                    </div>
                </div>
            </div>
            
            <!-- 요약 통계 카드 -->
            <div class="card">
                <h2>투자 요약</h2>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">최종 누적 자산</div>
                        <div class="stat-value" id="finalAsset">-</div>
                    </div>
                    
                    <div class="stat-box highlight">
                        <div class="stat-label">총 재투자액</div>
                        <div class="stat-value" id="totalInvested">-</div>
                    </div>
                    
                    <div class="stat-box positive">
                        <div class="stat-label">누적 수익금</div>
                        <div class="stat-value" id="totalProfit">-</div>
                    </div>
                    
                    <div class="stat-box">
                        <div class="stat-label">수익률 (전체 기간)</div>
                        <div class="stat-value" id="totalReturn">-</div>
                    </div>
                </div>
                
                <div class="info-banner">
                    💡 월별 필요 수익금은 누적 자산에 수익률을 곱하여 계산됩니다.
                </div>
            </div>
            
            <!-- 월별 상세 테이블 -->
            <div class="card table-card">
                <h2>월별 투자 수익 상세</h2>
                
                <div class="tab-container">
                    <div class="tabs" id="yearTabs">
                        <!-- 동적으로 생성됨 -->
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>월차</th>
                                <th>월별 기간</th>
                                <th>월초 자산</th>
                                <th>월 재투자</th>
                                <th>필요 수익금</th>
                                <th>월말 자산</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 동적으로 생성됨 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>Arusantimo Developer Tools © 2026 | <a href="/">홈페이지로 돌아가기</a></p>
    </footer>
    
    <script>
        let allTableRows = [];
        let yearGroups = {};
        
        function formatNumber(num) {
            if (num === null || num === undefined) return '-';
            return Math.floor(num).toLocaleString('ko-KR');
        }
        
        function getMonthsDifference(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            let months = 0;
            let current = new Date(start);
            
            while (current < end) {
                months++;
                current.setMonth(current.getMonth() + 1);
            }
            
            return Math.max(1, months);
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.getFullYear() + '년 ' + (date.getMonth() + 1) + '월';
        }
        
        function renderTableByYear(year) {
            const tableBody = document.getElementById('tableBody');
            const rows = yearGroups[year] || [];
            
            tableBody.innerHTML = rows.map(row => `
                <tr ${row.highlight ? 'class="highlight-row"' : ''}>
                    <td>${row.month}</td>
                    <td>${row.dateStr}</td>
                    <td class="number">${formatNumber(row.assetBefore)}</td>
                    <td class="number">${formatNumber(row.monthlyInv)}</td>
                    <td class="number" style="color: var(--accent-success);">${formatNumber(row.profit)}</td>
                    <td class="number">${formatNumber(row.assetAfter)}</td>
                </tr>
            `).join('');
        }
        
        function createYearTabs() {
            const yearTabs = document.getElementById('yearTabs');
            const years = Object.keys(yearGroups).sort((a, b) => a - b);
            
            yearTabs.innerHTML = years.map((year, index) => `
                <button class="tab ${index === 0 ? 'active' : ''}" data-year="${year}">
                    ${year}년
                </button>
            `).join('');
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    renderTableByYear(parseInt(this.dataset.year));
                });
            });
        }
        
        function calculateAndDisplay() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const monthlyInvestment = parseFloat(document.getElementById('monthlyInvestment').value) || 0;
            const monthlyRate = parseFloat(document.getElementById('monthlyRate').value) || 0;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            const months = getMonthsDifference(startDate, endDate);
            const rate = monthlyRate / 100;
            
            let currentAsset = principal;
            let totalInvested = principal;
            let totalProfit = 0;
            allTableRows = [];
            yearGroups = {};
            
            const startObj = new Date(startDate);
            
            for (let month = 1; month <= months; month++) {
                const monthlyProfit = currentAsset * rate;
                totalProfit += monthlyProfit;
                
                currentAsset += monthlyProfit;
                currentAsset += monthlyInvestment;
                totalInvested += monthlyInvestment;
                
                const currentDate = new Date(startObj);
                currentDate.setMonth(currentDate.getMonth() + month - 1);
                const year = currentDate.getFullYear();
                
                const dateStr = formatDate(currentDate.toISOString().split('T')[0]);
                const isLastMonth = month === months;
                
                const rowData = {
                    month: month,
                    dateStr: dateStr,
                    assetBefore: currentAsset - monthlyProfit - monthlyInvestment,
                    monthlyInv: monthlyInvestment,
                    profit: monthlyProfit,
                    assetAfter: currentAsset,
                    highlight: isLastMonth,
                    year: year
                };
                
                allTableRows.push(rowData);
                
                if (!yearGroups[year]) {
                    yearGroups[year] = [];
                }
                yearGroups[year].push(rowData);
            }
            
            const totalReturn = ((totalProfit / principal) * 100).toFixed(2);
            
            document.getElementById('finalAsset').textContent = formatNumber(currentAsset);
            document.getElementById('totalInvested').textContent = formatNumber(totalInvested);
            document.getElementById('totalProfit').textContent = formatNumber(totalProfit);
            document.getElementById('totalReturn').textContent = `${totalReturn}%`;
            
            createYearTabs();
            const firstYear = Object.keys(yearGroups).sort((a, b) => a - b)[0];
            renderTableByYear(parseInt(firstYear));
        }
        
        document.getElementById('principal').addEventListener('change', calculateAndDisplay);
        document.getElementById('monthlyInvestment').addEventListener('change', calculateAndDisplay);
        document.getElementById('monthlyRate').addEventListener('change', calculateAndDisplay);
        document.getElementById('startDate').addEventListener('change', calculateAndDisplay);
        document.getElementById('endDate').addEventListener('change', calculateAndDisplay);
        
        calculateAndDisplay();
    </script>
</body>
</html>
