<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시가베팅 추천 엔진 <span style="color:#38bdf8;">Pre-ATS</span></title>
  <link rel="stylesheet" href="style.css">
  <script src="../analysis-access-gate.js" data-redirect="../../index.html"></script>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- 투자 경고 배너 -->
    <div class="disclaimer-banner">
      ⚠️ 투자의 책임은 본인에게 있습니다. 해당 툴은 기계적인 시장 분석을 통한 종목 관찰 수단으로 사용하시길 권장합니다. 본인의 투자 철학에 맞는 투자를 진행하세요.
    </div>

    <!-- 메인 대시보드 마운트 포인트 -->
    <div id="app">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>시가베팅 분석 데이터를 로드하고 있습니다...</p>
      </div>
    </div>
  </div>

  <!-- 상세 정보 모달 팝업 -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="detail-modal">
      <div class="modal-header">
        <div class="modal-header-info">
          <div class="modal-stock-name" id="modal-name">종목명</div>
          <div class="modal-stock-sub">
            <span id="modal-code">000000</span>
            <span id="modal-type">전략 분류</span>
          </div>
        </div>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- 동적 렌더링 -->
      </div>
    </div>
  </div>

  <script src="artifact-loader.js"></script>
  <script src="store/results/latest.js"></script>
  <script src="main.js"></script>
</body>
</html>
