<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 치트시트 — Claude Code &amp; Codex CLI</title>
  <link rel="stylesheet" href="ai-cheatsheet.css">
</head>

<body>

  <!-- SHARED TOP BANNER -->
  <div class="top-banner">
    <span class="win-badge">⊞ WINDOWS</span>
    <span>AI 코딩 도구 치트시트 — Claude Code &amp; Codex CLI · Windows 기준</span>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn claude-tab active" data-tab="claude" onclick="switchTab('claude')">
      🤖 Claude Code <span class="tab-ver">v2.1.123</span>
    </button>
    <button class="tab-btn codex-tab" data-tab="codex" onclick="switchTab('codex')">
      ⬡ Codex CLI <span class="tab-ver">v0.125.0</span>
    </button>
    <div class="tab-spacer"></div>
    <button class="print-btn" onclick="window.print()">🖨️ 인쇄</button>
  </div>

  <!-- ══════════════════════════════════════════════ -->
    <!-- Containers for dynamic loading -->
  <div id="claude-container"></div>
  <div id="codex-container"></div>

  <script src="cheatsheet.js"></script>
  <script src="tooltips_claude.js"></script>
  <script src="tooltips_codex.js"></script>
  <script src="claude-content.js"></script>
  <script src="codex-content.js"></script>
  <script>

    // Load content dynamically
    document.getElementById('claude-container').outerHTML = claudeContent;
    document.getElementById('codex-container').outerHTML = codexContent;
    
    function switchTab(tab) {
      document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
      location.hash = tab === 'claude' ? '' : tab;
    }

    // URL hash support
    (function () {
      if (location.hash === '#codex') switchTab('codex');
    })();

    // Scoped tooltip apply (sync, data pre-loaded via script tag)
    applyTooltips(window.CLAUDE_TIPS, document.getElementById('tab-claude'));
    applyTooltips(window.CODEX_TIPS, document.getElementById('tab-codex'));

    function toggleHist(type) {
      const list = document.getElementById('hist-' + type);
      const divider = list.previousElementSibling;
      list.classList.toggle('open');
      divider.classList.toggle('open');
    }
  </script>
</body>

</html>
