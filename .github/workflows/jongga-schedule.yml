# 종가베팅 jongga 데이터 — 평일 KST 15:00 / 17:30 자동 생성 후 Pages 배포용 커밋
name: jongga-schedule

on:
  schedule:
    - cron: "0 6 * * 1-5"
    - cron: "30 8 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "실행 세션"
        required: true
        default: "1500"
        type: choice
        options:
          - "1500"
          - "1730"

concurrency:
  group: jongga-schedule-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-jongga:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve analysis session (KST)
        id: meta
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_SESSION: ${{ github.event.inputs.session }}
        run: |
          set -euo pipefail
          session=""
          label=""
          case "${SCHEDULE}" in
            "0 6 * * 1-5")
              session="1500"
              label="15:00 KST (3시 분석)"
              ;;
            "30 8 * * 1-5")
              session="1730"
              label="17:30 KST (5시반 분석)"
              ;;
          esac
          if [ "${INPUT_SESSION}" != "" ]; then
            session="${INPUT_SESSION}"
            case "${INPUT_SESSION}" in
              "1500") label="15:00 KST (3시 분석) [manual]" ;;
              "1730") label="17:30 KST (5시반 분석) [manual]" ;;
              *)
                echo "Unsupported session: ${INPUT_SESSION}" >&2
                exit 1
                ;;
            esac
          fi
          if [ "${session}" = "" ]; then
            echo "Unable to resolve jongga session from schedule or input" >&2
            exit 1
          fi
          echo "session=${session}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"
          echo "Resolved session: ${session} (${label})"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/stock-analyze/requirements-ci.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-jongga-${{ hashFiles('tools/stock-analyze/requirements-ci.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-jongga-

      - name: Install Python dependencies
        working-directory: tools/stock-analyze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tools/stock-analyze
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tools/stock-analyze
        run: python -m playwright install-deps chromium

      - name: Run jongga pipeline
        working-directory: tools/stock-analyze
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
          FORCE_COLOR: "1"
        run: python run_jongga_pipeline.py --session "${{ steps.meta.outputs.session }}"

      - name: Commit and push jongga outputs
        env:
          RUN_LABEL: ${{ steps.meta.outputs.label }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/stock-analyze/jongga/output/
          if git diff --staged --quiet; then
            echo "No jongga output changes — skip commit"
            exit 0
          fi
          git commit -m "chore(jongga): ${RUN_LABEL} 자동 갱신" -m "GitHub Actions jongga-schedule 워크플로가 종가베팅 추천 JSON/JS를 갱신했습니다."
          git push
