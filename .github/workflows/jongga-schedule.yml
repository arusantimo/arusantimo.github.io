# 종가베팅 jongga 데이터 — 외부 스케줄러가 평일 KST 15:00 / 17:30에 workflow_dispatch로 호출,
# 데이터 생성 후 Pages 배포용 커밋
name: jongga-schedule

on:
  workflow_dispatch:
    inputs:
      session:
        description: "실행 세션"
        required: true
        default: "1500"
        type: choice
        options:
          - "1500"
          - "1730"

concurrency:
  group: jongga-schedule-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-jongga:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      FORCE_COLOR: "1"
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
    steps:
      - name: Resolve analysis session (KST)
        id: meta
        env:
          INPUT_SESSION: ${{ github.event.inputs.session }}
        run: |
          set -euo pipefail
          case "${INPUT_SESSION}" in
            "1500") label="15:00 KST (3시 분석)" ;;
            "1730") label="17:30 KST (5시반 분석)" ;;
            *)
              echo "Unsupported session: ${INPUT_SESSION}" >&2
              exit 1
              ;;
          esac
          echo "session=${INPUT_SESSION}" >> "${GITHUB_OUTPUT}"
          echo "label=${label}" >> "${GITHUB_OUTPUT}"
          echo "Resolved session: ${INPUT_SESSION} (${label})"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/stock-analyze/requirements-ci.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-jongga-${{ hashFiles('tools/stock-analyze/requirements-ci.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-jongga-

      - name: Install Python dependencies
        working-directory: tools/stock-analyze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tools/stock-analyze
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tools/stock-analyze
        run: python -m playwright install-deps chromium

      - name: Verify Playwright runtime
        working-directory: tools/stock-analyze
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from playwright.sync_api import sync_playwright

          github_env = os.environ["GITHUB_ENV"]
          with sync_playwright() as p:
              executable_path = p.chromium.executable_path
              print(f"Resolved Playwright Chromium: {executable_path}")
              with open(github_env, "a", encoding="utf-8") as handle:
                  handle.write(f"MARKET_ANALYZE_PLAYWRIGHT_EXECUTABLE_PATH={executable_path}\n")
              browser = p.chromium.launch(headless=True)
              print(f"Playwright Chromium version: {browser.version}")
              browser.close()
          PY

      - name: Run jongga pipeline
        working-directory: tools/stock-analyze
        run: python run_jongga_pipeline.py --session "${{ steps.meta.outputs.session }}"

      - name: Commit and push jongga outputs
        env:
          RUN_LABEL: ${{ steps.meta.outputs.label }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/stock-analyze/jongga/output/
          if git diff --staged --quiet; then
            echo "No jongga output changes — skip commit"
            exit 0
          fi
          git commit -m "chore(jongga): ${RUN_LABEL} 자동 갱신" -m "GitHub Actions jongga-schedule 워크플로가 종가베팅 추천 JSON/JS를 갱신했습니다."
          git push
